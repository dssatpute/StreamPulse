# This is a Databricks asset bundle definition for streampulse.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: streampulse
  uuid: 6ba90a87-f0c1-4b41-b235-c00c129b0ad5

include:
  - resources/**/*.yml

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-1c1c0c3d-a6d5.cloud.databricks.com
    presets: 
      name_prefix : dev_${workspace.current_user.short_name}
      source_linked_deployment : false
   
  prod:
    mode: production
    workspace:
      host: https://dbc-1c1c0c3d-a6d5.cloud.databricks.com
      # We explicitly specify the root path to ensure a single production deployment
      root_path: /Workspace/${workspace.current_user.userName}/PROD/.bundle/${bundle.name}/${bundle.target}
    presets: 
      name_prefix : prod_${workspace.current_user.short_name} 
    permissions:
      - user_name: dnyaneshss99@gmail.com
        level: CAN_MANAGE
